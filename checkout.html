const products = window.products || [];
let cart = JSON.parse(localStorage.getItem('cart') || '[]');
let shippingFee = 0;

function renderCart() {
  const container = document.getElementById('cart-items');
  container.innerHTML = '';
  let subtotal = 0;

  cart.forEach(item => {
    const product = products.find(p => p.id === item.id);
    if (!product) return;
    const total = product.price * item.quantity;
    subtotal += total;
    container.innerHTML += `
      <div class="flex items-center justify-between py-4">
        <div class="flex items-center space-x-4">
          <img src="${product.image}" alt="${product.name}" class="w-16 h-16 object-cover rounded-md">
          <div>
            <p class="font-medium">${product.name}</p>
            <p class="text-gray-500 text-sm">Qty: ${item.quantity}</p>
          </div>
        </div>
        <p class="font-semibold">R${total.toFixed(2)}</p>
      </div>
    `;
  });

  localStorage.setItem('cartTotal', subtotal.toFixed(2));
  updateSummary();
}

function updateSummary() {
  const subtotal = parseFloat(localStorage.getItem('cartTotal') || 0);
  let total = subtotal + shippingFee;
  document.getElementById('checkout-subtotal').textContent = 'R' + subtotal.toFixed(2);
  document.getElementById('checkout-shipping').textContent = 'R' + shippingFee.toFixed(2);
  document.getElementById('checkout-total').textContent = 'R' + total.toFixed(2);
}

function updateShipping() {
  const location = document.getElementById('shipping-location').value;
  const subtotal = parseFloat(localStorage.getItem('cartTotal') || 0);
  const addressField = document.getElementById('address-field');

  if (subtotal >= 1000) shippingFee = 0;
  else if (location === 'door') shippingFee = 130;
  else if (location === 'uj') shippingFee = 30;
  else shippingFee = 0;

  addressField.classList.toggle('hidden', location !== 'door');
  updateSummary();
}

async function handleCheckout(event) {
  event.preventDefault();
  const subtotal = parseFloat(localStorage.getItem('cartTotal') || 0);
  const location = document.getElementById('shipping-location').value;
  const name = document.getElementById('customer-name').value;
  const email = document.getElementById('customer-email').value;
  const address = document.getElementById('customer-address').value;

  const response = await fetch("https://yourdomain.com/createCheckout", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ subtotal, location, customerName: name, customerEmail: email, address, cart })
  });

  const result = await response.json();
  if (result.redirectUrl) window.location.href = result.redirectUrl;
  else alert("Something went wrong. Please try again.");
}
